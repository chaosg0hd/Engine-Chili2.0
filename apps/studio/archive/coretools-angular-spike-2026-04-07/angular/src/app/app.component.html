<main class="welcome-shell">
  <section class="welcome-card">
    <header class="hero">
      <p class="eyebrow">Engine Studio</p>
      <h1>Hello, {{ title }}</h1>
      <p class="subtitle">Your Angular workspace is ready inside CoreTools.</p>
    </header>

    <div class="divider" aria-hidden="true"></div>

    <section class="content-block">
      <h2>What would you like to do next?</h2>
      <ul class="next-steps">
        <li>Open <code>src/app/app.component.html</code> to shape the UI.</li>
        <li>Update <code>src/app/app.component.ts</code> to wire new data.</li>
        <li>Run <code>npm run build:runtime</code> to refresh the WebView runtime.</li>
      </ul>
    </section>
  </section>
</main>
