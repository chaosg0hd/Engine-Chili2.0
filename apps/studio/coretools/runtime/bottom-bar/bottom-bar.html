<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Console</title>
    <link rel="stylesheet" href="../shared/studio.css">
</head>
<body class="console-surface">
    <main class="console-shell">
        <section class="console-container">
            <header class="console-header">
                <span class="console-status">Studio CLI</span>
            </header>

            <section class="console-output" id="console-output" aria-live="polite"></section>

            <form class="console-input-row" id="console-form">
                <span class="prompt">&gt;</span>
                <input id="console-input" type="text" autocomplete="off" spellcheck="false" value="help">
                <button class="primary-action" type="submit">Run</button>
            </form>
        </section>
    </main>

    <script>
        (function () {
            const form = document.getElementById("console-form");
            const input = document.getElementById("console-input");
            const output = document.getElementById("console-output");

            function appendLine(kind, text) {
                const line = document.createElement("p");
                line.className = "console-line " + kind;
                line.textContent = text;
                output.appendChild(line);
                output.scrollTop = output.scrollHeight;
            }

            function execute(command) {
                appendLine("command", "> " + command);
                fetch("http://127.0.0.1:37620/studio/console/execute?command=" + encodeURIComponent(command))
                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (result) {
                        if (result.clear) {
                            output.innerHTML = "";
                        }

                        appendLine(result.ok ? "response" : "error", result.output || "No output.");
                    })
                    .catch(function () {
                        appendLine("error", "Console bridge did not respond.");
                    });
            }

            let feedCursor = 0;
            function pollFeed() {
                fetch("http://127.0.0.1:37620/studio/console/feed?cursor=" + encodeURIComponent(String(feedCursor)))
                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (result) {
                        if (!result || !result.ok || !Array.isArray(result.lines)) {
                            return;
                        }

                        for (const line of result.lines) {
                            appendLine("response", line);
                        }

                        if (typeof result.cursor === "number") {
                            feedCursor = result.cursor;
                        }
                    })
                    .catch(function () {
                        return null;
                    });
            }

            form.addEventListener("submit", function (event) {
                event.preventDefault();
                const command = input.value.trim();
                input.value = "";
                execute(command);
            });

            appendLine("response", "Studio console ready. Type 'help'.");
            input.focus();
            setInterval(pollFeed, 800);
        }());
    </script>
</body>
</html>
