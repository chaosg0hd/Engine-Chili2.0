<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Explorer</title>
    <link rel="stylesheet" href="../../shared/studio.css">
    <link rel="stylesheet" href="./project-explorer.css">
</head>
<body>
    <aside class="explorer-shell">
        <header class="explorer-header">
            <div>
                <p class="kicker">Right Panel</p>
                <h1>Project Explorer</h1>
            </div>
            <button class="refresh-button" type="button" id="refresh-button">Refresh</button>
        </header>

        <section class="tree-panel" id="tree-panel" aria-label="Project files">
            <p class="empty-text">No project open.</p>
        </section>

        <section class="selection-panel" aria-live="polite">
            <strong>Selected</strong>
            <span id="selected-path">None</span>
        </section>

        <div class="modal-scrim" id="rename-modal" hidden>
            <section class="rename-dialog" role="dialog" aria-modal="true" aria-labelledby="rename-title">
                <h2 id="rename-title">Rename item</h2>
                <input id="rename-input" type="text" autocomplete="off">
                <p class="rename-error" id="rename-error"></p>
                <div class="rename-actions">
                    <button type="button" id="rename-cancel">Cancel</button>
                    <button type="button" id="rename-confirm">Rename</button>
                </div>
            </section>
        </div>
    </aside>

    <script>
        (function () {
            const treePanel = document.getElementById("tree-panel");
            const selectedPath = document.getElementById("selected-path");
            const refreshButton = document.getElementById("refresh-button");
            const renameModal = document.getElementById("rename-modal");
            const renameInput = document.getElementById("rename-input");
            const renameError = document.getElementById("rename-error");
            const renameCancel = document.getElementById("rename-cancel");
            const renameConfirm = document.getElementById("rename-confirm");
            const expanded = new Set();
            let contextEntry = null;

            function makeNode(entry) {
                const row = document.createElement("div");
                row.className = "tree-row" + (entry.isDirectory ? " is-directory" : " is-file");
                row.dataset.path = entry.logicalPath;

                const toggle = document.createElement("button");
                toggle.className = "tree-toggle";
                toggle.type = "button";
                toggle.textContent = entry.isDirectory ? (expanded.has(entry.logicalPath) || entry.isRoot ? "v" : ">") : "";
                toggle.disabled = !entry.isDirectory;

                const label = document.createElement("button");
                label.className = "tree-label";
                label.type = "button";
                label.textContent = entry.name;

                row.appendChild(toggle);
                row.appendChild(label);

                const container = document.createElement("div");
                container.className = "tree-node";
                container.appendChild(row);

                label.addEventListener("contextmenu", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    contextEntry = entry;
                    openNativeContextMenu(entry, event.screenX, event.screenY);
                });

                if (entry.isDirectory && (expanded.has(entry.logicalPath) || entry.isRoot)) {
                    const children = document.createElement("div");
                    children.className = "tree-children";
                    for (const child of entry.children || []) {
                        children.appendChild(makeNode(child));
                    }
                    container.appendChild(children);
                }

                toggle.addEventListener("click", function () {
                    if (expanded.has(entry.logicalPath)) {
                        expanded.delete(entry.logicalPath);
                    } else {
                        expanded.add(entry.logicalPath);
                    }
                    refresh();
                });

                label.addEventListener("click", function () {
                    if (entry.isDirectory) {
                        if (expanded.has(entry.logicalPath)) {
                            expanded.delete(entry.logicalPath);
                        } else {
                            expanded.add(entry.logicalPath);
                        }
                        refresh();
                        return;
                    }

                    fetch("http://127.0.0.1:37620/studio/project-explorer/select?path=" + encodeURIComponent(entry.logicalPath))
                        .then(function (response) { return response.json(); })
                        .then(function (result) {
                            selectedPath.textContent = result.logicalPath || result.message;
                            refresh();
                        })
                        .catch(function () {
                            selectedPath.textContent = "Selection failed.";
                        });
                });

                return container;
            }

            function getEntryName(entry) {
                if (!entry || !entry.logicalPath) {
                    return "";
                }

                const slash = entry.logicalPath.lastIndexOf("/");
                return slash < 0 ? entry.logicalPath : entry.logicalPath.substring(slash + 1);
            }

            function openRenameModal() {
                if (!contextEntry || contextEntry.isRoot) {
                    selectedPath.textContent = "Cannot rename the project root.";
                    return;
                }

                renameInput.value = getEntryName(contextEntry);
                renameError.textContent = "";
                renameModal.hidden = false;
                renameInput.focus();
                renameInput.select();
            }

            function closeRenameModal() {
                renameModal.hidden = true;
                renameError.textContent = "";
            }

            function renameProjectItem(logicalPath, newName) {
                renameConfirm.disabled = true;
                fetch(
                    "http://127.0.0.1:37620/studio/project-explorer/rename?path=" +
                    encodeURIComponent(logicalPath) +
                    "&newName=" +
                    encodeURIComponent(newName))
                    .then(function (response) { return response.json(); })
                    .then(function (result) {
                        if (!result.ok) {
                            renameError.textContent = result.message || "Rename failed.";
                            return;
                        }

                        selectedPath.textContent = result.newLogicalPath || result.logicalPath || "Renamed.";
                        closeRenameModal();
                        refresh();
                    })
                    .catch(function () {
                        renameError.textContent = "Rename bridge did not respond.";
                    })
                    .finally(function () {
                        renameConfirm.disabled = false;
                    });
            }

            function openEntry(entry) {
                if (entry.isDirectory) {
                    if (expanded.has(entry.logicalPath)) {
                        expanded.delete(entry.logicalPath);
                    } else {
                        expanded.add(entry.logicalPath);
                    }
                    refresh();
                    return;
                }

                fetch("http://127.0.0.1:37620/studio/project-explorer/select?path=" + encodeURIComponent(entry.logicalPath))
                    .then(function (response) { return response.json(); })
                    .then(function (result) {
                        selectedPath.textContent = result.logicalPath || result.message;
                        refresh();
                    })
                    .catch(function () {
                        selectedPath.textContent = "Selection failed.";
                    });
            }

            function applyContextAction(action) {
                if (!contextEntry || !action) {
                    return;
                }

                if (action === "open") {
                    openEntry(contextEntry);
                    return;
                }

                if (action === "rename") {
                    openRenameModal();
                }
            }

            function openNativeContextMenu(entry, screenX, screenY) {
                fetch(
                    "http://127.0.0.1:37620/studio/project-explorer/context-menu?path=" +
                    encodeURIComponent(entry.logicalPath) +
                    "&screenX=" +
                    encodeURIComponent(String(screenX)) +
                    "&screenY=" +
                    encodeURIComponent(String(screenY)) +
                    "&isRoot=" +
                    encodeURIComponent(entry.isRoot ? "true" : "false"))
                    .then(function (response) { return response.json(); })
                    .then(function (result) {
                        if (!result.ok) {
                            selectedPath.textContent = result.message || "Context menu failed.";
                            return;
                        }

                        applyContextAction(result.action);
                    })
                    .catch(function () {
                        selectedPath.textContent = "Native context menu bridge did not respond.";
                    });
            }

            function render(data) {
                treePanel.innerHTML = "";
                if (!data.ok) {
                    treePanel.innerHTML = "<p class=\"empty-text\"></p>";
                    treePanel.querySelector(".empty-text").textContent = data.message || "Directory read failed.";
                    return;
                }

                if (!data.hasProject) {
                    treePanel.innerHTML = "<p class=\"empty-text\">No project open.</p>";
                    selectedPath.textContent = "None";
                    return;
                }

                selectedPath.textContent = data.selectedPath || "None";
                treePanel.appendChild(makeNode(data.root));
            }

            function refresh() {
                refreshButton.disabled = true;
                fetch("http://127.0.0.1:37620/studio/project-explorer/tree")
                    .then(function (response) { return response.json(); })
                    .then(render)
                    .catch(function () {
                        treePanel.innerHTML = "<p class=\"empty-text\">Project Explorer bridge did not respond.</p>";
                    })
                    .finally(function () {
                        refreshButton.disabled = false;
                    });
            }

            renameCancel.addEventListener("click", closeRenameModal);
            renameConfirm.addEventListener("click", function () {
                if (!contextEntry) {
                    return;
                }

                renameProjectItem(contextEntry.logicalPath, renameInput.value);
            });
            renameInput.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    renameConfirm.click();
                }

                if (event.key === "Escape") {
                    closeRenameModal();
                }
            });

            refreshButton.addEventListener("click", refresh);
            window.addEventListener("load", refresh);
            setInterval(refresh, 2500);
        }());
    </script>
</body>
</html>
