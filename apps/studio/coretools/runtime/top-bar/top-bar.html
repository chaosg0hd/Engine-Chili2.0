<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Top Bar</title>
    <link rel="stylesheet" href="../shared/studio.css">
</head>

<body class="studio-topbar-surface">
    <header class="studio-topbar" aria-label="Studio top bar">
        <section class="brand-block" aria-label="Studio identity">
            <p class="kicker">Chili Engine 2.0</p>
            <div class="brand-row">
                <h1>Studio</h1>
            </div>
        </section>

        <section class="ribbon-stack" aria-label="Studio command ribbon">
            <nav class="action-strip action-strip-primary" aria-label="Session controls">
                <button class="top-action" type="button" data-command-group="project">
                    Project
                </button>

                <span class="bar-spacer" aria-hidden="true">|</span>

                <button class="top-action" type="button" data-command-group="workspace">
                    Workspace
                </button>

                <span class="bar-spacer" aria-hidden="true">|</span>

                <button class="top-action" type="button" data-command-group="build">
                    Build
                </button>

                <span class="bar-spacer" aria-hidden="true">|</span>

                <button class="top-action" type="button" data-command-group="run">
                    Run
                </button>

                <!-- DROPDOWN: project
                    New Project        -> project:new
                    Open Project       -> project:open
                    Save Project       -> project:save
                    Close Project      -> project:close
                    Project Settings   -> project:settings
                -->

                <!-- DROPDOWN: workspace
                    Save Layout        -> workspace:save-layout
                    Reset Layout       -> workspace:reset-layout
                    Toggle Explorer    -> workspace:toggle-explorer
                    Toggle Console     -> workspace:toggle-console
                -->

                <!-- DROPDOWN: build
                    Configure          -> build:configure
                    Build              -> build:build
                    Rebuild            -> build:rebuild
                    Clean              -> build:clean
                -->

                <!-- DROPDOWN: run
                    Play               -> run:play
                    Pause              -> run:pause
                    Stop               -> run:stop
                    Run Settings       -> run:settings
                -->
            </nav>

            <nav class="action-strip action-strip-pipeline" aria-label="Creation pipeline">
                <button class="top-action pipeline-action" type="button" data-stage="assets">
                    Assets
                </button>

                <span class="bar-spacer" aria-hidden="true">|</span>

                <button class="top-action pipeline-action is-active" type="button" data-stage="scene"
                    aria-pressed="true">
                    Scene
                </button>

                <span class="bar-spacer" aria-hidden="true">|</span>

                <button class="top-action pipeline-action" type="button" data-stage="visual">
                    Visual
                </button>

                <span class="bar-spacer" aria-hidden="true">|</span>

                <button class="top-action pipeline-action" type="button" data-stage="logic">
                    Logic
                </button>

                <span class="bar-spacer" aria-hidden="true">|</span>

                <button class="top-action pipeline-action" type="button" data-stage="ui">
                    UI
                </button>

                <span class="bar-spacer" aria-hidden="true">|</span>

                <button class="top-action pipeline-action" type="button" data-stage="output">
                    Output
                </button>

                <!-- STAGE: assets
                    Import
                    Asset browser
                    Meshes
                    Textures
                    Shaders
                    Audio
                    Validation
                -->

                <!-- STAGE: scene
                    Entity
                    Hierarchy
                    Transform
                    Parent / unparent
                    Duplicate / delete
                    Frame selected
                -->

                <!-- STAGE: visual
                    Materials
                    Lighting
                    Camera
                    Environment
                    Effects
                    Preview
                -->

                <!-- STAGE: logic
                    Scripts
                    Events
                    State
                    Input bindings
                    Triggers
                -->

                <!-- STAGE: ui
                    Canvas
                    Panel
                    Button
                    Text
                    Layout
                    Style
                -->

                <!-- STAGE: output
                    Play
                    Pause
                    Stop
                    Step
                    Build
                    Profile
                -->
            </nav>
        </section>

        <section class="status-strip" aria-label="Session status">
            <div class="notice-runtime-toggle" role="group" aria-label="Runtime transport">
                <button type="button" class="notice-runtime-button" id="runtime-play-button">▶ Play</button>
                <button type="button" class="notice-runtime-button" id="runtime-pause-button">⏸ Pause</button>
                <button type="button" class="notice-runtime-button" id="runtime-stop-button">⏹ Stop</button>
            </div>

            <span class="bar-spacer" aria-hidden="true">|</span>

            <div class="notice-runtime-toggle" role="group" aria-label="Viewport visibility">
                <button type="button" class="notice-runtime-button is-active" id="camera-gizmo-toggle">Cameras</button>
                <button type="button" class="notice-runtime-button is-active" id="sky-plane-toggle">Sky</button>
            </div>

            <span class="bar-spacer" aria-hidden="true">|</span>

            <div class="status-chip status-ok" id="ok-chip">
                <span class="status-dot"></span>
            </div>

            <span class="bar-spacer" aria-hidden="true">|</span>

            <div class="status-chip status-warn" id="warn-chip">
                <span class="status-dot"></span>
            </div>

            <span class="bar-spacer" aria-hidden="true">|</span>

            <div class="status-chip status-error" id="error-chip">
                <span class="status-dot"></span>
            </div>
        </section>
    </header>
    <div class="studio-notice-row">
        <p class="studio-notice" id="studio-notice" aria-live="polite"></p>
        <span class="studio-controls-hint" aria-label="Viewport controls reference">Orbit MMB &thinsp;·&thinsp; Pan Shift+MMB &thinsp;·&thinsp; Zoom Scroll &thinsp;·&thinsp; Select LMB &thinsp;·&thinsp; Focus F</span>
    </div>

    <script>
        (function () {
            const projectButton = document.querySelector("[data-command-group='project']");
            const workspaceButton = document.querySelector("[data-command-group='workspace']");
            const buildButton = document.querySelector("[data-command-group='build']");
            const runButton = document.querySelector("[data-command-group='run']");
            const okChip = document.getElementById("ok-chip");
            const warnChip = document.getElementById("warn-chip");
            const errorChip = document.getElementById("error-chip");
            const notice = document.getElementById("studio-notice");
            const runtimePlayButton = document.getElementById("runtime-play-button");
            const runtimePauseButton = document.getElementById("runtime-pause-button");
            const runtimeStopButton = document.getElementById("runtime-stop-button");
            const cameraGizmoToggle = document.getElementById("camera-gizmo-toggle");
            const skyPlaneToggle = document.getElementById("sky-plane-toggle");
            let noticeHideTimer = null;

            function setRuntimeToggleState(state) {
                const lower = String(state || "").toLowerCase();
                const isPlaying = lower.indexOf("play") >= 0;
                const isPaused = lower.indexOf("pause") >= 0;
                const isStopped = !isPlaying && !isPaused;
                if (runtimePlayButton) {
                    runtimePlayButton.classList.toggle("is-active", isPlaying);
                }
                if (runtimePauseButton) {
                    runtimePauseButton.classList.toggle("is-active", isPaused);
                }
                if (runtimeStopButton) {
                    runtimeStopButton.classList.toggle("is-active", isStopped);
                }
                if (okChip) {
                    okChip.classList.toggle("is-active", isPlaying);
                }
                if (warnChip) {
                    warnChip.classList.toggle("is-active", isPaused);
                }
            }

            function setStatus(message, isError, context) {
                if (warnChip) {
                    warnChip.title = message || "";
                }

                if (errorChip) {
                    errorChip.title = isError ? (message || "") : "";
                }

                if (!notice) {
                    return;
                }

                if (noticeHideTimer) {
                    clearTimeout(noticeHideTimer);
                    noticeHideTimer = null;
                }

                if (!message) {
                    notice.classList.remove("is-visible");
                    notice.textContent = "";
                    return;
                }

                if (isError && context === "open-project") {
                    notice.textContent = "Warning: active directory has no valid Studio project content to open or run. " + message;
                } else if (isError) {
                    notice.textContent = "Warning: " + message;
                } else {
                    notice.textContent = message;
                }
                notice.classList.toggle("is-error", !!isError);
                notice.classList.add("is-visible");

                noticeHideTimer = setTimeout(function () {
                    notice.classList.remove("is-visible");
                }, isError ? 3600 : 2200);
            }

            function callJson(route) {
                return fetch("http://127.0.0.1:37620" + route)
                    .then(function (response) { return response.json(); })
                    .catch(function () { return null; });
            }

            function runProjectAction(action, triggerButton) {
                const routes = {
                    "new-project": "/studio/open-new-project",
                    "open-project": "/studio/open-project",
                    "save-project": "/studio/save-project",
                    "build-app": "/studio/build/project?runAfterBuild=false&exportAfterBuild=true",
                    "preview-app": "/studio/build/project?runAfterBuild=true&exportAfterBuild=true"
                };
                const route = routes[action];
                if (!route) {
                    return;
                }

                triggerButton.disabled = true;
                callJson(route)
                    .then(function (result) {
                        setStatus(
                            result && result.message ? result.message : "Project action finished.",
                            !(result && result.ok),
                            action);
                    })
                    .finally(function () {
                        triggerButton.disabled = false;
                    });
            }

            function openProjectMenu(screenX, screenY) {
                projectButton.disabled = true;
                callJson(
                    "/studio/project/context-menu?screenX=" +
                    encodeURIComponent(String(screenX)) +
                    "&screenY=" +
                    encodeURIComponent(String(screenY)))
                    .then(function (result) {
                        if (result && result.ok) {
                            runProjectAction(result.action, projectButton);
                        }
                    })
                    .finally(function () {
                        projectButton.disabled = false;
                    });
            }

            function runWorkspaceAction() {
                workspaceButton.disabled = true;
                callJson("/studio/workspace/toggle-explorer")
                    .then(function (result) {
                        setStatus(result && result.message ? result.message : "Workspace action finished.", !(result && result.ok), "workspace");
                    })
                    .finally(function () {
                        workspaceButton.disabled = false;
                    });
            }

            function runBuildAction(route) {
                buildButton.disabled = true;
                callJson(route || "/studio/build/project")
                    .then(function (result) {
                        setStatus(result && result.message ? result.message : "Build action finished.", !(result && result.ok), "build");
                    })
                    .finally(function () {
                        buildButton.disabled = false;
                    });
            }

            function openBuildMenu(screenX, screenY) {
                buildButton.disabled = true;
                callJson(
                    "/studio/build/context-menu?screenX=" +
                    encodeURIComponent(String(screenX)) +
                    "&screenY=" +
                    encodeURIComponent(String(screenY)))
                    .then(function (result) {
                        if (!result || !result.ok || !result.action) {
                            return;
                        }

                        // Build and preview actions should export first so Studio does not
                        // run stale/non-exported outputs from a different path.
                        if (result.action === "build-app") {
                            runBuildAction("/studio/build/project?runAfterBuild=false&exportAfterBuild=true");
                            return;
                        }

                        if (result.action === "preview-app") {
                            runBuildAction("/studio/build/project?runAfterBuild=true&exportAfterBuild=true");
                        }
                    })
                    .finally(function () {
                        buildButton.disabled = false;
                    });
            }

            function runRuntimeAction(route, triggerButton) {
                if (triggerButton) { triggerButton.disabled = true; }
                callJson(route)
                    .then(function (result) {
                        if (result && result.state) {
                            const lowerState = String(result.state).toLowerCase();
                            if (lowerState.indexOf("play") >= 0) {
                                setRuntimeToggleState("playing");
                            } else if (lowerState.indexOf("pause") >= 0) {
                                setRuntimeToggleState("paused");
                            } else {
                                setRuntimeToggleState("stopped");
                            }
                        }

                        setStatus(result && result.message ? result.message : "Runtime action finished.", !(result && result.ok), "run");
                    })
                    .finally(function () {
                        if (triggerButton) { triggerButton.disabled = false; }
                    });
            }

            if (projectButton) {
                projectButton.addEventListener("click", function (event) {
                    event.preventDefault();
                    openProjectMenu(event.screenX, event.screenY);
                });

                projectButton.addEventListener("contextmenu", function (event) {
                    event.preventDefault();
                    openProjectMenu(event.screenX, event.screenY);
                });
            }

            if (workspaceButton) {
                workspaceButton.addEventListener("click", function (event) {
                    event.preventDefault();
                    if (event.shiftKey) {
                        workspaceButton.disabled = true;
                        callJson("/studio/workspace/save-layout")
                            .then(function (result) {
                                setStatus(result && result.message ? result.message : "Layout save finished.", !(result && result.ok), "save-layout");
                            })
                            .finally(function () {
                                workspaceButton.disabled = false;
                            });
                        return;
                    }

                    runWorkspaceAction();
                });

                workspaceButton.addEventListener("contextmenu", function (event) {
                    event.preventDefault();
                    workspaceButton.disabled = true;
                    callJson("/studio/workspace/toggle-console")
                        .then(function (result) {
                            setStatus(result && result.message ? result.message : "Workspace action finished.", !(result && result.ok), "workspace");
                        })
                        .finally(function () {
                            workspaceButton.disabled = false;
                        });
                });
            }

            if (buildButton) {
                buildButton.addEventListener("click", function (event) {
                    event.preventDefault();
                    openBuildMenu(event.screenX, event.screenY);
                });

                buildButton.addEventListener("contextmenu", function (event) {
                    event.preventDefault();
                    openBuildMenu(event.screenX, event.screenY);
                });
            }

            if (runButton) {
                runButton.dataset.runtimeState = "stopped";
                runButton.addEventListener("click", function (event) {
                    event.preventDefault();
                    runRuntimeAction("/studio/runtime/play");
                });

                setInterval(function () {
                    callJson("/studio/runtime/viewport")
                        .then(function (result) {
                            if (!result || !result.state) {
                                return;
                            }

                            const lowerState = String(result.state).toLowerCase();
                            if (lowerState.indexOf("play") >= 0) {
                                runButton.dataset.runtimeState = "playing";
                                setRuntimeToggleState("playing");
                                return;
                            }

                            if (lowerState.indexOf("pause") >= 0) {
                                runButton.dataset.runtimeState = "paused";
                                setRuntimeToggleState("paused");
                                return;
                            }

                            runButton.dataset.runtimeState = "stopped";
                            setRuntimeToggleState("stopped");
                        });
                }, 1000);
            }

            if (runtimePlayButton) {
                runtimePlayButton.addEventListener("click", function () {
                    runRuntimeAction("/studio/runtime/play", runtimePlayButton);
                });
            }

            if (runtimePauseButton) {
                runtimePauseButton.addEventListener("click", function () {
                    runRuntimeAction("/studio/runtime/pause", runtimePauseButton);
                });
            }

            if (runtimeStopButton) {
                runtimeStopButton.addEventListener("click", function () {
                    runRuntimeAction("/studio/runtime/stop", runtimeStopButton);
                });
            }

            if (cameraGizmoToggle) {
                cameraGizmoToggle.addEventListener("click", function () {
                    cameraGizmoToggle.disabled = true;
                    callJson("/studio/camera-gizmo/toggle")
                        .then(function (result) {
                            if (result) {
                                cameraGizmoToggle.classList.toggle("is-active", !!result.visible);
                            }
                        })
                        .finally(function () { cameraGizmoToggle.disabled = false; });
                });
            }

            if (skyPlaneToggle) {
                skyPlaneToggle.addEventListener("click", function () {
                    skyPlaneToggle.disabled = true;
                    callJson("/studio/sky-plane/toggle")
                        .then(function (result) {
                            if (result) {
                                skyPlaneToggle.classList.toggle("is-active", !!result.visible);
                            }
                        })
                        .finally(function () { skyPlaneToggle.disabled = false; });
                });
            }

        }());
    </script>
</body>

</html>
