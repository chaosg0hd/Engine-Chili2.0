<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreTools</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="coretools-shell">
        <header class="hero-panel">
            <div class="hero-copy">
                <p class="eyebrow">Docked Tools</p>
                <h1>CoreTools</h1>
                <p class="body-copy">
                    Compact sidebar actions for common editor workflows.
                </p>
            </div>
            <div class="hero-badge">
                <span class="badge-label">Layout</span>
                <strong>16 Tools</strong>
                <span class="badge-note">Small sidebar fit</span>
            </div>
        </header>

        <section class="panel launcher-panel" aria-label="CoreTools launcher">
            <div class="panel-heading">
                <p class="panel-label">Launcher</p>
                <h2>Tool Grid</h2>
            </div>

            <div class="tool-grid" role="list" aria-label="Core tools">
                <button class="tool-tile tone-primary" type="button" role="listitem">
                    <span class="tool-icon">Sc</span>
                    <span class="tool-label">Scene</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">As</span>
                    <span class="tool-label">Assets</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">In</span>
                    <span class="tool-label">Inspector</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Hi</span>
                    <span class="tool-label">Hierarchy</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Lo</span>
                    <span class="tool-label">Logs</span>
                </button>
                <button class="tool-tile tone-secondary" type="button" role="listitem">
                    <span class="tool-icon">Pr</span>
                    <span class="tool-label">Profiler</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">De</span>
                    <span class="tool-label">Debug</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Sh</span>
                    <span class="tool-label">Shaders</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Ma</span>
                    <span class="tool-label">Materials</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Bu</span>
                    <span class="tool-label">Build</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Te</span>
                    <span class="tool-label">Tests</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Pa</span>
                    <span class="tool-label">Packages</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Se</span>
                    <span class="tool-label">Search</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Ta</span>
                    <span class="tool-label">Tasks</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Gi</span>
                    <span class="tool-label">Git</span>
                </button>
                <button class="tool-tile" type="button" role="listitem">
                    <span class="tool-icon">Se</span>
                    <span class="tool-label">Settings</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        (function () {
            const grid = document.querySelector(".tool-grid");
            if (!grid) {
                return;
            }

            const tileCount = grid.children.length;
            const preferredColumns = [4, 2];

            function pickColumns(width) {
                for (const columns of preferredColumns) {
                    if (tileCount % columns !== 0) {
                        continue;
                    }

                    const gaps = Math.max(0, columns - 1) * 6;
                    const tileSize = (width - gaps) / columns;
                    if (tileSize >= 48) {
                        return columns;
                    }
                }

                return 2;
            }

            function applyGridLayout() {
                const width = grid.clientWidth;
                if (!width) {
                    return;
                }

                const columns = pickColumns(width);
                grid.style.setProperty("--tool-columns", String(columns));
            }

            const observer = new ResizeObserver(applyGridLayout);
            observer.observe(grid);
            window.addEventListener("load", applyGridLayout);
            window.addEventListener("resize", applyGridLayout);
            applyGridLayout();
        }());
    </script>
</body>
</html>
